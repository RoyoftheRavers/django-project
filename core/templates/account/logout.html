{% extends 'core/base.html' %}

{% block title %}Sign Out — My Website{% endblock %}

{% block content %}

<section class="hero">
  <h1>Sign out</h1>
  <p class="hero-subtitle">Are you sure you want to sign out?</p>
</section>

<section class="auth-section">
  <div class="auth-card">
    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn">Yes, sign me out</button>
    </form>
    <p class="auth-link"><a href="{% url 'home' %}">Cancel and go back</a></p>
  </div>
</section>

{% endblock %}
