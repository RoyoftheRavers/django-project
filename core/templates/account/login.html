{% extends 'core/base.html' %}

{% block title %}Sign In — My Website{% endblock %}

{% block content %}

<section class="hero">
  <h1>Sign in</h1>
  <p class="hero-subtitle">Welcome back!</p>
</section>

<section class="auth-section">
  <div class="auth-card">
    <form method="POST" action="{% url 'account_login' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Sign in</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="{% url 'account_signup' %}">Register here</a></p>
  </div>
</section>

{% endblock %}
