{% extends 'core/base.html' %}

{% block title %}Reset Password — My Website{% endblock %}

{% block content %}

<section class="hero">
  <h1>Reset your password</h1>
  <p class="hero-subtitle">Enter your email and we'll send you a link to reset your password.</p>
</section>

<section class="auth-section">
  <div class="auth-card">
    <form method="POST" action="{% url 'account_reset_password' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Send reset link</button>
    </form>
    <p class="auth-link"><a href="{% url 'account_login' %}">Back to sign in</a></p>
  </div>
</section>

{% endblock %}
